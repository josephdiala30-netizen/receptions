<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.gstatic.com https://fonts.googleapis.com https://*.firebaseio.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com wss://firestore.googleapis.com https://*.firebaseio.com;">
  <title>Executive Path | Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../firebase-data.js"></script>
  <script src="../shared.js"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-container": "var(--on-primary-container)", "on-surface": "var(--on-surface)",
            "outline": "var(--outline)", "on-background": "var(--on-background)",
            "on-secondary-fixed": "var(--on-secondary-fixed)", "surface-container-highest": "var(--surface-container-highest)",
            "inverse-surface": "var(--inverse-surface)", "tertiary-fixed-dim": "var(--tertiary-fixed-dim)",
            "surface": "var(--surface)", "secondary": "var(--secondary)", "on-secondary": "var(--on-secondary)",
            "on-primary-fixed-variant": "var(--on-primary-fixed-variant)", "secondary-container": "var(--secondary-container)",
            "on-error": "var(--on-error)", "on-primary": "var(--on-primary)",
            "on-error-container": "var(--on-error-container)", "on-tertiary": "var(--on-tertiary)",
            "surface-container-high": "var(--surface-container-high)", "inverse-on-surface": "var(--inverse-on-surface)",
            "on-secondary-container": "var(--on-secondary-container)", "surface-variant": "var(--surface-variant)",
            "primary-container": "var(--primary-container)", "error-container": "var(--error-container)",
            "tertiary": "var(--tertiary)", "inverse-primary": "var(--inverse-primary)",
            "secondary-fixed-dim": "var(--secondary-fixed-dim)", "tertiary-container": "var(--tertiary-container)",
            "surface-container-low": "var(--surface-container-low)", "surface-container-lowest": "var(--surface-container-lowest)",
            "on-tertiary-container": "var(--on-tertiary-container)", "on-secondary-fixed-variant": "var(--on-secondary-fixed-variant)",
            "surface-container": "var(--surface-container)", "on-primary-fixed": "var(--on-primary-fixed)",
            "error": "var(--error)", "background": "var(--background)", "primary-fixed": "var(--primary-fixed)",
            "surface-tint": "var(--surface-tint)", "outline-variant": "var(--outline-variant)",
            "primary-fixed-dim": "var(--primary-fixed-dim)", "on-tertiary-fixed": "var(--on-tertiary-fixed)",
            "on-tertiary-fixed-variant": "var(--on-tertiary-fixed-variant)", "on-surface-variant": "var(--on-surface-variant)",
            "tertiary-fixed": "var(--tertiary-fixed)", "primary": "var(--primary)", "surface-dim": "var(--surface-dim)",
            "surface-bright": "var(--surface-bright)", "secondary-fixed": "var(--secondary-fixed)"
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../styles/custom.css" />
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 relative font-sans">

  <div class="absolute top-6 right-6">
    <button id="themeToggle" class="p-2.5 rounded-xl hover:bg-surface-container-high transition active:scale-95" onclick="toggleTheme()" title="Toggle theme">
      <span class="material-symbols-outlined text-on-surface-variant">dark_mode</span>
    </button>
  </div>

  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-primary tracking-tight">Executive Login</h1>
      <p class="text-sm text-on-surface-variant mt-1 font-semibold">Sign in to your account</p>
    </div>

    <div class="glass-card border border-outline-variant/30 shadow-2xl p-8 rounded-3xl animate-fade-in">
      <div class="flex mb-6 bg-surface-container rounded-xl p-1">
        <button id="tabLogin" class="flex-1 py-2.5 text-center font-label-md rounded-lg bg-primary text-on-primary transition-all" onclick="switchTab('login')">Login</button>
        <button id="tabRegister" class="flex-1 py-2.5 text-center font-label-md rounded-lg text-on-surface-variant hover:text-primary transition-all" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="space-y-4">
          <h2 class="text-lg font-bold text-primary text-center">KALYX TASK LOGIN</h2>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Email</label>
            <input id="loginUser" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Enter your email" type="email" autocomplete="email"/>
          </div>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Password</label>
            <input id="loginPass" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Enter password" type="password"/>
          </div>
          <div id="loginError" class="text-xs font-semibold text-error hidden"></div>
          <div id="loginSuccess" class="text-xs font-semibold text-emerald-600 hidden bg-emerald-50 dark:bg-emerald-950/20 border border-emerald-500/20 p-3 rounded-xl"></div>
          <button id="loginBtn" class="w-full bg-primary text-on-primary py-3 rounded-xl font-bold hover:opacity-90 transition-all active:scale-[0.98] shadow-md flex items-center justify-center gap-2" onclick="doLogin()"><span id="loginBtnText">Sign In</span><span id="loginSpinner" class="hidden"><svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg></span></button>

          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/60"></div></div>
            <div class="relative flex justify-center text-xs font-semibold text-on-surface-variant"><span class="bg-surface-container-lowest px-3">Or continue with</span></div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button class="flex items-center justify-center gap-2.5 w-full border border-outline-variant rounded-xl py-2.5 px-4 text-sm font-semibold text-on-surface-variant hover:bg-surface-container hover:border-outline transition-all active:scale-[0.98]" onclick="alert('Google login coming soon!')">
              <svg class="w-5 h-5" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-2.5 7.2-9.4 12-17.3 12-10 0-18-8-18-18s8-18 18-18c4.6 0 8.7 1.7 11.9 4.5l5.6-5.6C34.1 1.7 29.4 0 24 0 10.8 0 0 10.8 0 24s10.8 24 24 24c11.4 0 21.3-8 23.8-18.8.3-1.2.5-2.5.5-3.7 0-2.3-.3-4.6-.7-5.4z"/><path fill="#FF3D00" d="M3.3 14.7l6.5 4.8C12 14.8 17.5 12 24 12c3 0 5.7 1 7.9 2.8l5.9-5.9C34.2 5.4 29.5 3.4 24 3.4 15.8 3.4 8.5 8 3.3 14.7z"/><path fill="#4CAF50" d="M24 47.4c5.8 0 11.2-2.1 15.3-5.7l-7.1-6c-2.2 1.5-5 2.4-8.2 2.4-6.5 0-12-4.4-14-10.4l-6.5 5c3.8 7.5 11.5 12.7 20.5 12.7z"/><path fill="#1976D2" d="M47.5 21H24v6h13.6c-.5 1.6-1.2 3.1-2.1 4.4l7.1 6c2-2.3 3.5-5.1 4.3-8.4.6-2 .9-4.1.9-5.4 0-.5 0-1-.2-1.5z"/></svg>
              Google
            </button>
            <button class="flex items-center justify-center gap-2.5 w-full border border-outline-variant rounded-xl py-2.5 px-4 text-sm font-semibold text-on-surface-variant hover:bg-surface-container hover:border-outline transition-all active:scale-[0.98]" onclick="alert('Facebook login coming soon!')">
              <svg class="w-5 h-5" viewBox="0 0 48 48"><path fill="#1877F2" d="M24 0C10.7 0 0 10.7 0 24c0 13.3 10.7 24 24 24s24-10.7 24-24C48 10.7 37.3 0 24 0z"/><path fill="#fff" d="M30 15h-4c-1.7 0-3 1.3-3 3v4h-3v4h3v12h4V26h4l1-4h-5v-3c0-.6.4-1 1-1h4v-3z"/></svg>
              Facebook
            </button>
          </div>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="hidden">
        <div class="space-y-4">
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Full Name</label>
            <input id="regName" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Enter full name" type="text"/>
          </div>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Username</label>
            <input id="regUser" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Choose a username" type="text"/>
          </div>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Email</label>
            <input id="regEmail" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Enter email address" type="email"/>
          </div>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Password</label>
            <input id="regPass" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Create a password" type="password"/>
          </div>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Confirm Password</label>
            <input id="regPass2" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all" placeholder="Confirm password" type="password"/>
          </div>
          <div>
            <label class="block mb-1.5 text-xs font-bold text-on-surface-variant">Portal / Role</label>
            <select id="regRole" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-sm focus:outline-none transition-all">
              <option value="executive_task">Executive Task</option>
              <option value="executive_path">Executive Path (Travel)</option>
              <option value="executive_it">Executive IT</option>
            </select>
          </div>
          <div id="regError" class="text-xs font-semibold text-error hidden"></div>
          <button class="w-full bg-primary text-on-primary py-3 rounded-xl font-bold hover:opacity-90 transition-all active:scale-[0.98] shadow-md" onclick="doRegister()">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <div id="regSuccessModal" class="hidden fixed inset-0 z-[999] flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-surface-container-lowest dark:bg-surface-container-low rounded-2xl shadow-2xl max-w-md w-full mx-4 p-8 text-center">
      <div class="w-16 h-16 rounded-full bg-emerald-100 dark:bg-emerald-900/30 flex items-center justify-center mx-auto mb-4">
        <span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400" style="font-size:36px;">check_circle</span>
      </div>
      <h2 class="text-2xl font-bold text-on-surface mb-2">Welcome to KALYX!</h2>
      <p class="text-on-surface-variant text-sm leading-relaxed mb-1">Account created successfully, <span id="regSuccessName" class="font-semibold text-primary"></span>!</p>
      <p class="text-on-surface-variant text-sm leading-relaxed mb-6">Please log in with your credentials to get started.</p>
      <button onclick="closeRegSuccess()" class="w-full bg-primary text-on-primary py-3 rounded-xl font-bold hover:opacity-90 transition-all active:scale-[0.98] shadow-md">Continue to Login</button>
    </div>
  </div>

  <script>
    function getBaseUrl() {
      var path = window.location.pathname;
      path = path.replace(/\/login\/?.*$/i, '/');
      if (!path.endsWith('/')) {
        path += '/';
      }
      return path;
    }

    var selectedPortal = 'executive_path';

    function selectPortal(portal) {
      selectedPortal = portal;
      var labels = { executive_path: 'Executive Path', executive_task: 'Executive Task', executive_it: 'Executive IT' };
      ['portalPath','portalTask','portalIT'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
          el.className = 'flex-1 flex items-center justify-center gap-1.5 py-2 text-center font-label-md rounded-lg transition-all text-xs' +
            (id === 'portalPath' && portal === 'executive_path' ? ' bg-primary text-on-primary' :
             id === 'portalTask' && portal === 'executive_task' ? ' bg-primary text-on-primary' :
             id === 'portalIT' && portal === 'executive_it' ? ' bg-primary text-on-primary' :
             ' text-on-surface-variant hover:text-primary');
        }
      });
      document.getElementById('loginForm').querySelector('h2').textContent = labels[portal] + ' Login';
      document.getElementById('loginError').classList.add('hidden');
    }

    function updateRegisterVisibility() {
      var tab = document.getElementById('tabRegister');
      if (tab) tab.style.display = '';
    }

    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tabLogin').className = tab === 'login'
        ? 'flex-1 py-2.5 text-center font-label-md rounded-lg bg-primary text-on-primary transition-all'
        : 'flex-1 py-2.5 text-center font-label-md rounded-lg text-on-surface-variant hover:text-primary transition-all';
      document.getElementById('tabRegister').className = tab === 'register'
        ? 'flex-1 py-2.5 text-center font-label-md rounded-lg bg-primary text-on-primary transition-all'
        : 'flex-1 py-2.5 text-center font-label-md rounded-lg text-on-surface-variant hover:text-primary transition-all';
      document.getElementById('loginError').classList.add('hidden');
      document.getElementById('regError').classList.add('hidden');
      var successEl = document.getElementById('loginSuccess');
      if (successEl) successEl.classList.add('hidden');
    }

    function setLoading(loading) {
      var btn = document.getElementById('loginBtn');
      var text = document.getElementById('loginBtnText');
      var spinner = document.getElementById('loginSpinner');
      btn.disabled = loading;
      btn.className = loading ? 'w-full bg-primary/60 text-on-primary py-3 rounded-xl font-bold cursor-not-allowed flex items-center justify-center gap-2 shadow-md' : 'w-full bg-primary text-on-primary py-3 rounded-xl font-bold hover:opacity-90 transition-all active:scale-[0.98] shadow-md flex items-center justify-center gap-2';
      if (loading) { spinner.classList.remove('hidden'); text.textContent = 'Signing in...'; }
      else { spinner.classList.add('hidden'); text.textContent = 'Sign In'; }
    }

    function getEmailForLogin(input) {
      if (input.indexOf('@') !== -1) return input;
      return input + '@app.local';
    }

    function migrateLocalUserToFirebase(found, pass, callback) {
      var auth = firebase.auth();
      var db = firebase.firestore();
      if (!auth || !db) { if (callback) callback({ message: 'Firebase not available' }); return; }

      var email = found.email || (found.username + '@app.local');

      auth.createUserWithEmailAndPassword(email, pass).then(function(result) {
        var uid = result.user.uid;
        // Build user data from localStorage
        var userData = { profile: { username: found.username, name: found.name || found.username, email: email, isAdmin: found.isAdmin || false, role: found.role || 'executive_path' } };
        var prefixes = ['tasks_','plans_','milestones_','dailylog_','trips_','shared_tasks_'];
        prefixes.forEach(function(p) { try { var v = JSON.parse(localStorage.getItem(p + found.username)); if (Array.isArray(v)) userData[p.replace('_','')] = v; } catch(e) {} });
        var itTypes = ['assets','services','maintenance','inventory','task','planner','accomplishments','tickets','systems'];
        itTypes.forEach(function(t) { try { var v = JSON.parse(localStorage.getItem('it_' + t + '_' + found.username)); if (Array.isArray(v)) userData['it_' + t] = v; } catch(e) {} });

        Promise.all([
          db.collection('profiles').doc(uid).set({
            username: found.username, name: found.name || found.username, email: email,
            role: found.role || 'executive_path', is_admin: found.isAdmin || false,
            executive_admin: found.executiveAdmin || false
          }),
          db.collection('userdata').doc(uid).set({ data: userData })
        ]).then(function() {
          // Clear migrated localStorage data
          var keys = [found.username, 'tasks_', 'plans_', 'milestones_', 'dailylog_', 'trips_', 'shared_tasks_'];
          prefixes.concat(itTypes.map(function(t) { return 'it_' + t + '_'; })).forEach(function(p) {
            localStorage.removeItem(p + found.username);
          });
          localStorage.removeItem('welcome_' + found.username);
          if (callback) callback(null, { username: found.username, name: found.name || found.username, role: found.role || 'executive_path', isAdmin: found.isAdmin || false });
        }).catch(function(err) { if (callback) callback(err); });
      }).catch(function(err) {
        if (err.code === 'auth/email-already-in-use') {
          // Account exists — sign in and update profile + data
          auth.signInWithEmailAndPassword(email, pass).then(function(result) {
            var uid = result.user.uid;
            var userData = { profile: { username: found.username, name: found.name || found.username, email: email, isAdmin: found.isAdmin || false, role: found.role || 'executive_path' } };
            db.collection('profiles').doc(uid).set({
              username: found.username, name: found.name || found.username, email: email,
              role: found.role || 'executive_path', is_admin: found.isAdmin || false
            }).then(function() {
              db.collection('userdata').doc(uid).set({ data: userData }).then(function() {
                if (callback) callback(null, { username: found.username, name: found.name || found.username, role: found.role || 'executive_path', isAdmin: found.isAdmin || false });
              }).catch(function(e) { if (callback) callback(e); });
            }).catch(function(e) { if (callback) callback(e); });
          }).catch(function(e) { if (callback) callback(e); });
        } else {
          if (callback) callback(err);
        }
      });
    }

    function doLogin() {
      var loginInput = document.getElementById('loginUser').value.trim();
      var pass = document.getElementById('loginPass').value;
      var errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      setLoading(true);
      window.__fbLoggingIn = true;

      if (!loginInput || !pass) {
        errEl.textContent = 'Please enter email and password.';
        errEl.classList.remove('hidden');
        setLoading(false);
        return;
      }

      var email = getEmailForLogin(loginInput);

      // Try Firebase Auth first
      fbLogin(email, pass, function(loginErr, session) {
        if (loginErr) {
          // If user not found, try migrating from localStorage (one-time)
          var shouldMigrate = loginErr.code === 'auth/user-not-found' || loginErr.code === 'auth/invalid-credential';
          if (shouldMigrate) {
            var found = (JSON.parse(localStorage.getItem('users') || '[]')).find(function(u) {
              return u.username === loginInput || u.email === loginInput;
            });
            if (found) {
              migrateLocalUserToFirebase(found, pass, function(migrateErr, migrated) {
                window.__fbLoggingIn = false;
                setLoading(false);
                if (migrateErr) {
                  errEl.textContent = loginErr.message || 'Invalid login credentials';
                  errEl.classList.remove('hidden');
                } else {
                  // Log in with the newly created Firebase account
                  fbLogin(email, pass, function(err2, session2) {
                    if (err2) {
                      errEl.textContent = err2.message || 'Login failed after migration';
                      errEl.classList.remove('hidden');
                    } else {
                      window.location.href = getBaseUrl() + session2.role + '/';
                    }
                  });
                }
              });
              return;
            }
          }

          window.__fbLoggingIn = false;
          setLoading(false);
          errEl.textContent = loginErr.message || 'Invalid login credentials';
          errEl.classList.remove('hidden');
        } else {
          window.__fbLoggingIn = false;
          setLoading(false);
          window.location.href = getBaseUrl() + session.role + '/';
        }
      });
    }

    function closeRegSuccess() {
      document.getElementById('regSuccessModal').classList.add('hidden');
      switchTab('login');
    }

    function doRegister() {
      var name = document.getElementById('regName').value.trim();
      var user = document.getElementById('regUser').value.trim();
      var email = document.getElementById('regEmail').value.trim();
      var pass = document.getElementById('regPass').value;
      var pass2 = document.getElementById('regPass2').value;
      var errEl = document.getElementById('regError');
      errEl.classList.add('hidden');

      if (!name || !user || !email || !pass) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.classList.remove('hidden');
        return;
      }
      if (pass !== pass2) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }
      if (pass.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.classList.remove('hidden');
        return;
      }

      var role = document.getElementById('regRole').value;

      // Register via Firebase Auth (no localStorage)
      fbRegister(email, pass, { username: user, name: name, role: role, isAdmin: false }, function(regErr) {
        if (regErr) {
          var msg = regErr.message || regErr;
          if (msg.indexOf('email-already') > -1) msg = 'Email already in use.';
          else if (msg.indexOf('username') > -1) msg = 'Username already exists.';
          else if (msg.indexOf('weak-password') > -1) msg = 'Password too weak (min 6 characters).';
          errEl.textContent = msg;
          errEl.classList.remove('hidden');
          return;
        }

        // Clear inputs
        document.getElementById('regName').value = '';
        document.getElementById('regUser').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPass').value = '';
        document.getElementById('regPass2').value = '';

        // Show Welcome Modal
        document.getElementById('regSuccessName').textContent = name;
        document.getElementById('regSuccessModal').classList.remove('hidden');
      });
    }

    initTheme();
    updateRegisterVisibility();

    // Auto-redirect if logged in (wait for onAuthStateChanged via initFirebase)
    if (!window.__fbRegistering && !window.__fbLoggingIn) {
      initFirebase(function(err, session) {
        if (session && session.loggedIn) {
          window.location.href = getBaseUrl() + session.role + '/';
        }
      });
    }
  </script>
</body>
</html>
