        "body-lg": ["16px", {lineHeight: "24px", fontWeight: "400"}],
        "label-md": ["12px", {lineHeight: "16px", fontWeight: "500"}],
        "title-lg": ["20px", {lineHeight: "28px", fontWeight: "600"}],
        "code-sm": ["12px", {lineHeight: "16px", fontWeight: "400"}],
        "display-lg": ["48px", {lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700"}],
        "body-md": ["14px", {lineHeight: "20px", fontWeight: "400"}],
        "headline-lg-mobile": ["24px", {lineHeight: "32px", fontWeight: "600"}],
        "headline-lg": ["32px", {lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600"}]
      }
    }
  }
}

<style>

  --on-primary-container: #8590a6; --on-surface: #0b1c30; --outline: #75777d;
  --on-background: #0b1c30; --on-secondary-fixed: #131b2e; --surface-container-highest: #d3e4fe;
  --inverse-surface: #213145; --tertiary-fixed-dim: #6bd8cb; --surface: #f8f9ff;
  --secondary: #565e74; --on-secondary: #ffffff; --on-primary-fixed-variant: #3c475a;
  --secondary-container: #dae2fd; --on-error: #ffffff; --on-primary: #ffffff;

  --inverse-on-surface: #eaf1ff; --on-secondary-container: #5c647a; --surface-variant: #d3e4fe;
  --primary-container: #1e293b; --error-container: #ffdad6; --tertiary: #001815;
  --inverse-primary: #bcc7de; --secondary-fixed-dim: #bec6e0; --tertiary-container: #002f2a;
  --surface-container-low: #eff4ff; --surface-container-lowest: #ffffff;
  --on-tertiary-container: #28a094; --on-secondary-fixed-variant: #3f465c;
  --surface-container: #e5eeff; --on-primary-fixed: #111c2d; --error: #ba1a1a;

  --on-tertiary-fixed-variant: #005049; --on-surface-variant: #45474c;
  --tertiary-fixed: #89f5e7; --primary: #091426; --surface-dim: #cbdbf5;

  --on-primary-container: #b0b8cc; --on-surface: #e4e8ee; --outline: #90949c;

  --inverse-surface: #d4dfee; --tertiary-fixed-dim: #50b8aa; --surface: #111827;
  --secondary: #a0a8ba; --on-secondary: #111827; --on-primary-fixed-variant: #a8b0c4;
  --secondary-container: #2a3448; --on-error: #111827; --on-primary: #0b1c30;
  --on-error-container: #ffb4ab; --on-tertiary: #111827; --surface-container-high: #253040;
  --inverse-on-surface: #213145; --on-secondary-container: #b8c0d4; --surface-variant: #253040;

  --surface-container: #1e2a3a; --on-primary-fixed: #d8e3fb; --error: #ffb4ab;
  --background: #0b1320; --primary-fixed: #111c2d; --surface-tint: #9098ac;
  --outline-variant: #3a3e46; --primary-fixed-dim: #2c384a; --on-tertiary-fixed: #89f5e7;
  --on-tertiary-fixed-variant: #6bd8cb; --on-surface-variant: #c4c8ce;
  --tertiary-fixed: #00201d; --primary: #b0c8e8; --surface-dim: #141c2a;
  --surface-bright: #2a3448; --secondary-fixed: #131b2e;

  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  display: inline-flex; align-items: center; justify-content: center;
  vertical-align: middle;
}
* { -webkit-tap-highlight-color: transparent; }

html, body {
  min-height: 100%;
  scroll-behavior: smooth;
}
body { overflow-x: hidden; }
button, input, select, textarea { min-width: 0; }

@media (max-width: 767px) {
  .max-w-md { padding-left: 1rem; padding-right: 1rem; }
  table { min-width: 100%; }
  th, td { word-break: break-word; }

</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-4 relative">

<div class="absolute top-6 right-6">
  <button id="themeToggle" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high p-2.5 rounded-xl transition-all duration-200 active:scale-90" onclick="toggleTheme()" title="Toggle theme">dark_mode</button>
</div>

<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Executive Login</h1>
    <p class="font-label-md text-on-surface-variant mt-1">Sign in to your account</p>
  </div>

  <div class="bg-surface-container-lowest/90 backdrop-blur-xl border border-outline-variant rounded-2xl p-8 shadow-sm">
    <div class="flex mb-6 bg-surface-container rounded-xl p-1">
      <button id="tabLogin" class="flex-1 py-2.5 text-center font-label-md rounded-lg bg-primary text-on-primary transition-all" onclick="switchTab('login')">Login</button>
      <button id="tabRegister" class="flex-1 py-2.5 text-center font-label-md rounded-lg text-on-surface-variant hover:text-primary transition-all" onclick="switchTab('register')">Register</button>
    </div>

    <div id="loginForm">
      <div class="space-y-4">
        <div>
          <label class="font-label-md text-on-surface-variant block mb-1.5">Username</label>
          <input id="loginUser" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Enter username" type="text" autocomplete="username"/>
        </div>
        <div>
          <label class="font-label-md text-on-surface-variant block mb-1.5">Password</label>
          <input id="loginPass" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Enter password" type="password"/>
        </div>
        <div id="loginError" class="font-label-md text-error hidden"></div>
        <button class="w-full bg-primary text-on-primary py-3 rounded-xl font-title-lg hover:opacity-90 transition-all active:scale-[0.98] shadow-sm" onclick="doLogin()">Sign In</button>
      </div>
    </div>

    <div id="registerForm" class="hidden">
      <div class="space-y-4">
        <div>
          <label class="font-label-md text-on-surface-variant block mb-1.5">Full Name</label>
          <input id="regName" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Enter full name" type="text"/>
        </div>
        <div>
          <label class="font-label-md text-on-surface-variant block mb-1.5">Username</label>
          <input id="regUser" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Choose a username" type="text"/>
        </div>
        <div>
          <label class="font-label-md text-on-surface-variant block mb-1.5">Password</label>
          <input id="regPass" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Create a password" type="password"/>
        </div>
        <div>
          <label class="font-label-md text-on-surface-variant block mb-1.5">Confirm Password</label>
          <input id="regPass2" class="w-full bg-surface-container border border-outline-variant rounded-xl py-2.5 px-4 text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Confirm password" type="password"/>
        </div>
        <div id="regError" class="font-label-md text-error hidden"></div>
        <button class="w-full bg-primary text-on-primary py-3 rounded-xl font-title-lg hover:opacity-90 transition-all active:scale-[0.98] shadow-sm" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>
</div>



<script>
function initTheme() {
  var theme = localStorage.getItem('theme') || 'light';
  var btn = document.getElementById('themeToggle');
  if (!btn) return;
  if (theme === 'dark') {
    document.documentElement.classList.add('dark');
    btn.textContent = 'light_mode';
  } else {
    btn.textContent = 'dark_mode';
  }
}
function toggleTheme() {
  var isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = isDark ? 'light_mode' : 'dark_mode';
}

function getBaseUrl() {
  var p = window.location.pathname.replace(/\/?index\.html$/, '').replace(/\/$/, '');
  return p.substring(0, p.lastIndexOf('/') + 1);
}

function switchTab(tab) {
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tabLogin').className = tab === 'login'
    ? 'flex-1 py-2 text-center font-label-md rounded-md bg-primary text-on-primary transition-all'
    : 'flex-1 py-2 text-center font-label-md rounded-md text-on-surface-variant hover:text-primary transition-all';
  document.getElementById('tabRegister').className = tab === 'register'
    ? 'flex-1 py-2 text-center font-label-md rounded-md bg-primary text-on-primary transition-all'
    : 'flex-1 py-2 text-center font-label-md rounded-md text-on-surface-variant hover:text-primary transition-all';
  document.getElementById('loginError').classList.add('hidden');
  document.getElementById('regError').classList.add('hidden');
}

async function hashPass(pass) {
  var enc = new TextEncoder().encode(pass);
  var buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function doLogin() {
  var user = document.getElementById('loginUser').value.trim();
  var pass = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginError');

  if (!user || !pass) {
    errEl.textContent = 'Please enter username and password.';
    errEl.classList.remove('hidden');
    return;
  }

  var users = JSON.parse(localStorage.getItem('users') || '[]');
  hashPass(pass).then(function(hash) {
    var found = users.find(function(u) { return u.username === user && u.password === hash; });
    if (found) {
      var role = found.role || 'executive_path';
      localStorage.setItem('session', JSON.stringify({ username: user, name: found.name, isAdmin: found.isAdmin || false, role: role, loggedIn: true, timestamp: Date.now() }));
      window.location.href = getBaseUrl() + (role === 'executive_task' ? 'executive_task/' : role === 'admin' ? 'admin/' : '');
    } else {
      errEl.textContent = 'Invalid username or password.';
      errEl.classList.remove('hidden');
    }
  });
}

function doRegister() {
  var name = document.getElementById('regName').value.trim();
  var user = document.getElementById('regUser').value.trim();
  var pass = document.getElementById('regPass').value;
  var pass2 = document.getElementById('regPass2').value;
  var errEl = document.getElementById('regError');

  if (!name || !user || !pass) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.remove('hidden');
    return;
  }
  if (pass !== pass2) {
    errEl.textContent = 'Passwords do not match.';
    errEl.classList.remove('hidden');
    return;
  }
  if (pass.length < 4) {
    errEl.textContent = 'Password must be at least 4 characters.';
    errEl.classList.remove('hidden');
    return;
  }

  var users = JSON.parse(localStorage.getItem('users') || '[]');
  if (users.find(function(u) { return u.username === user; })) {
    errEl.textContent = 'Username already exists.';
    errEl.classList.remove('hidden');
    return;
  }

  hashPass(pass).then(function(hash) {
    users.push({ username: user, name: name, password: hash, isAdmin: false, role: 'executive_path' });
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('session', JSON.stringify({ username: user, name: name, isAdmin: false, role: 'executive_path', loggedIn: true, timestamp: Date.now() }));
    window.location.href = getBaseUrl();
  });
}

initTheme();

var existingSession = JSON.parse(localStorage.getItem('session') || 'null');
if (existingSession && existingSession.loggedIn) {
  var role = existingSession.role || 'executive_path';
  window.location.href = getBaseUrl() + (role === 'executive_task' ? 'executive_task/' : role === 'admin' ? 'admin/' : '');
}

(function seedAccounts() {
  var users = JSON.parse(localStorage.getItem('users') || '[]');
  if (!users.some(function(u) { return u.username === 'superadmin'; })) {
    users.push({ username: 'superadmin', name: 'Super Administrator', password: '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9', isAdmin: true, role: 'admin' });
  }
  if (!users.some(function(u) { return u.username === 'admin'; })) {
    users.push({ username: 'admin', name: 'Administrator', password: '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9', isAdmin: true, role: 'executive_path' });
  }
  if (!users.some(function(u) { return u.username === 'executive'; })) {
    users.push({ username: 'executive', name: 'Executive User', password: '92c1f38320e64405e98c349c27334b3bd6c636f88347b279ef2530b66354efc5', isAdmin: false, role: 'executive_task' });
  }
  localStorage.setItem('users', JSON.stringify(users));
})();
</script>
</body>
</html>
