<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>System Cleanup</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    var path = window.location.pathname;
    var src = (path.indexOf('/cleanup/') !== -1) ? '../firebase-config.js' : 'firebase-config.js';
    document.write('<script src="' + src + '"><\/script>');
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-lg w-full bg-gray-800 rounded-2xl p-6 shadow-2xl space-y-6">
    <div class="text-center">
      <div class="w-16 h-16 rounded-full bg-red-500/20 flex items-center justify-center mx-auto mb-3">
        <span class="text-3xl">🧹</span>
      </div>
      <h1 class="text-2xl font-bold text-white">System Cleanup</h1>
      <p class="text-gray-400 text-sm mt-1">Burahin lahat ng Firestore user data maliban sa superadmin</p>
    </div>

    <!-- Login -->
    <div id="authArea" class="space-y-4">
      <p class="text-sm text-yellow-400 bg-yellow-500/10 border border-yellow-500/30 rounded-xl p-3">⚠️ Log in as <strong>superadmin@kalyx.com</strong> para magsimula ng cleanup.</p>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input id="email" type="email" value="superadmin@kalyx.com" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
      </div>
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition">Log In</button>
    </div>

    <!-- Cleanup Area -->
    <div id="cleanupArea" class="hidden space-y-4">
      <div class="bg-gray-700/50 p-4 rounded-xl border border-gray-700">
        <p class="text-sm text-gray-300">Logged in as: <strong id="currentEmail" class="text-blue-400"></strong></p>
        <p class="text-xs text-gray-500 mt-1">UID: <span id="currentUid" class="text-gray-400"></span></p>
      </div>

      <div id="userList" class="space-y-2"></div>

      <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4">
        <p class="text-sm text-red-400 font-semibold mb-2">⚠️ WARNING: Ang mga aksyon sa ibaba ay PERMANENTE at hindi na maibabalik.</p>
        <div class="space-y-2">
          <button onclick="cleanFirestore()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition">
            🗑️ Burahin lahat ng Firestore data (maliban sa superadmin)
          </button>
          <button onclick="cleanSuperadminData()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl transition">
            🧹 Linisin ang superadmin data (itira lang ang profile)
          </button>
          <button onclick="clearLocalStorage()" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-xl transition">
            💾 I-clear ang localStorage ng browser na ito
          </button>
        </div>
      </div>
    </div>

    <!-- Log -->
    <div id="logConsole" class="hidden text-xs font-mono bg-black text-green-400 rounded-xl p-4 h-64 overflow-y-auto border border-gray-700"></div>
  </div>

  <script>
    var currentUser = null;
    var superadminUid = null;

    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        currentUser = user;
        document.getElementById('authArea').classList.add('hidden');
        document.getElementById('cleanupArea').classList.remove('hidden');
        document.getElementById('currentEmail').textContent = user.email;
        document.getElementById('currentUid').textContent = user.uid;
        superadminUid = user.uid;
        log('Logged in as ' + user.email + ' (UID: ' + user.uid + ')');
        listAllUsers();
      } else {
        currentUser = null;
        document.getElementById('authArea').classList.remove('hidden');
        document.getElementById('cleanupArea').classList.add('hidden');
      }
    });

    function log(msg) {
      var el = document.getElementById('logConsole');
      el.classList.remove('hidden');
      el.innerHTML += '> ' + msg + '<br>';
      el.scrollTop = el.scrollHeight;
    }

    async function login() {
      var email = document.getElementById('email').value.trim();
      var pw = document.getElementById('password').value;
      if (!email || !pw) { alert('Fill in both fields'); return; }
      try {
        await firebase.auth().signInWithEmailAndPassword(email, pw);
      } catch(err) {
        alert('Login failed: ' + err.message);
      }
    }

    async function listAllUsers() {
      log('Fetching all Firestore userdata documents...');
      try {
        var snapshot = await firebase.firestore().collection('userdata').get();
        var listEl = document.getElementById('userList');
        var html = '<p class="text-sm font-semibold text-gray-300 mb-2">Found ' + snapshot.size + ' user document(s):</p>';

        snapshot.forEach(function(doc) {
          var data = doc.data();
          var profile = data.profile || {};
          var isSuperadmin = (profile.username === 'superadmin' || doc.id === superadminUid);
          var dataKeys = Object.keys(data).filter(function(k) { return k !== 'profile'; });

          html += '<div class="flex items-center justify-between bg-gray-700/50 rounded-xl px-4 py-3 border ' +
            (isSuperadmin ? 'border-green-500/50' : 'border-gray-600') + '">' +
            '<div>' +
            '<span class="font-semibold text-white">' + (profile.username || 'unknown') + '</span>' +
            '<span class="text-gray-400 text-xs ml-2">' + (profile.email || doc.id) + '</span>' +
            '<span class="text-gray-500 text-xs ml-2">(' + dataKeys.length + ' data keys)</span>' +
            '</div>' +
            '<span class="text-xs font-semibold ' + (isSuperadmin ? 'text-green-400' : 'text-red-400') + '">' +
            (isSuperadmin ? '✅ KEEP' : '❌ DELETE') + '</span></div>';
        });

        listEl.innerHTML = html;
        log('Listed ' + snapshot.size + ' documents.');
      } catch(err) {
        log('ERROR listing users: ' + err.message);
      }
    }

    async function cleanFirestore() {
      if (!confirm('SIGURADO KA BA? Ito ay mang-bura ng LAHAT ng Firestore user data maliban sa superadmin. Hindi na ito maibabalik!')) return;

      log('Starting Firestore cleanup...');
      try {
        var snapshot = await firebase.firestore().collection('userdata').get();
        var deleted = 0;
        var kept = 0;

        for (var i = 0; i < snapshot.docs.length; i++) {
          var doc = snapshot.docs[i];
          var data = doc.data();
          var profile = data.profile || {};

          if (profile.username === 'superadmin' || doc.id === superadminUid) {
            log('  KEEPING: ' + (profile.username || doc.id));
            kept++;
            continue;
          }

          log('  DELETING: ' + (profile.username || doc.id) + ' (' + doc.id + ')...');
          await firebase.firestore().collection('userdata').doc(doc.id).delete();
          deleted++;
          log('    Deleted!');
        }

        log('Cleanup complete! Deleted: ' + deleted + ', Kept: ' + kept);
        alert('Cleanup complete! ' + deleted + ' user(s) deleted, ' + kept + ' kept.');
        listAllUsers();
      } catch(err) {
        log('ERROR: ' + err.message);
        alert('Error: ' + err.message);
      }
    }

    async function cleanSuperadminData() {
      if (!confirm('Ito ay mang-bura ng lahat ng tasks, plans, trips, at iba pang data ng superadmin. Profile lang ang matitira. Sigurado ka ba?')) return;

      log('Cleaning superadmin data...');
      try {
        var doc = await firebase.firestore().collection('userdata').doc(superadminUid).get();
        if (!doc.exists) {
          log('No superadmin document found.');
          return;
        }

        var data = doc.data();
        var profile = data.profile || {};

        // Keep only profile, delete everything else
        await firebase.firestore().collection('userdata').doc(superadminUid).set({ profile: profile });
        log('Superadmin data cleaned. Only profile remains.');
        alert('Superadmin data cleaned!');
      } catch(err) {
        log('ERROR: ' + err.message);
        alert('Error: ' + err.message);
      }
    }

    function clearLocalStorage() {
      if (!confirm('Ito ay mang-clear ng buong localStorage ng browser na ito. Mala-logout ka. Sigurado ka ba?')) return;

      var keysToRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key !== 'theme') {
          keysToRemove.push(key);
        }
      }

      keysToRemove.forEach(function(k) {
        localStorage.removeItem(k);
        log('  Removed localStorage key: ' + k);
      });

      log('LocalStorage cleared! (' + keysToRemove.length + ' keys removed, theme preference kept)');
      alert('LocalStorage cleared! ' + keysToRemove.length + ' keys removed.');
    }
  </script>
</body>
</html>
