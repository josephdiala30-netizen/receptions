<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Executive IT – Management Portal</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = { darkMode: "class", theme: { extend: {} } };
    function getBaseUrl(){
      var p = window.location.pathname.replace(/\/?index\.html$/, '').replace(/\/$/, '');
      return p.substring(0, p.lastIndexOf('/') + 1);
    }
    function initTheme(){
      var theme = localStorage.getItem('theme') || 'light';
      if(theme==='dark') document.documentElement.classList.add('dark');
    }
    function toggleTheme(){
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark?'dark':'light');
    }
    initTheme();
  </script>
  <style>
    /* Reuse the same CSS variables as the main site */
    :root{--on-primary:#ffffff;--primary:#091426;--background:#f8f9ff;/* ... more variables omitted for brevity ... */}
    .dark{--background:#0b1320;}
  </style>
</head>
<body class="bg-background text-on-background font-body-md">
  <header class="fixed top-0 left-0 w-full bg-surface/80 backdrop-blur-xl border-b border-outline-variant z-50">
    <div class="max-w-6xl mx-auto px-4 md:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-2xl">workspace_premium</span>
        <span class="font-headline-md font-bold text-primary tracking-tight">Executive IT</span>
      </div>
      <div class="flex items-center gap-3">
        <button id="themeToggle" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high p-2.5 rounded-xl transition-all" onclick="toggleTheme()" title="Toggle theme">dark_mode</button>
        <a class="bg-primary text-on-primary px-5 py-2 rounded-xl font-label-md font-semibold hover:opacity-90 transition-all" href="../login/">Sign In</a>
      </div>
    </div>
  </header>
  <section class="pt-28 pb-20 md:pt-36 md:pb-28 text-center">
    <div class="max-w-3xl mx-auto">
      <h1 class="font-display-lg text-4xl md:text-5xl font-extrabold mb-6">Executive IT Management</h1>
      <p class="font-body-lg text-on-surface-variant max-w-2xl mx-auto mb-8">Centralized portal for overseeing technology assets, monitoring system health, and coordinating IT projects within the executive ecosystem.</p>
      <a class="bg-primary text-on-primary px-6 py-3 rounded-xl font-title-lg font-semibold hover:opacity-90" href="../login/">Get Started</a>
    </div>
  </section>
  <footer class="border-t border-outline-variant py-10 text-center">
    <p class="font-label-md text-on-surface-variant">© 2026 Executive IT. All rights reserved.</p>
  </footer>
</body>
</html>
