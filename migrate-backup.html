<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backup → Firestore Migration</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6">
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-slate-900 mb-2">Backup → Firestore Migration</h1>
  <p class="text-sm text-slate-500 mb-6">Ili-lipat lahat ng data mula sa backup JSON papuntang Firebase Firestore.</p>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-4">
    <label class="block text-sm font-semibold text-slate-700 mb-2">1. Piliin ang backup JSON file:</label>
    <input id="fileInput" type="file" accept=".json" class="w-full text-sm mb-4">
    <label class="block text-sm font-semibold text-slate-700 mb-2">2. Default password para sa lahat ng users (mapapalitan pag login):</label>
    <input id="defaultPass" type="text" value="Kalyx2024!" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm mb-4">
    <button id="startBtn" onclick="startMigration()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-500 transition-colors">Start Migration</button>
  </div>

  <div id="log" class="space-y-1.5 font-mono text-xs"></div>
</div>

<script>
var backupData = null;

function log(msg, ok) {
  var el = document.getElementById('log');
  var c = ok ? 'text-emerald-600' : 'text-slate-500';
  el.innerHTML += '<div class="' + c + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}

async function startMigration() {
  var btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Migrating...';
  document.getElementById('log').innerHTML = '';

  var pass = document.getElementById('defaultPass').value.trim();
  if (!pass || pass.length < 6) { log('Password must be at least 6 characters', false); btn.disabled = false; btn.textContent = 'Start Migration'; return; }

  // Load backup file from file input
  var fileInput = document.getElementById('fileInput');
  if (!fileInput.files || !fileInput.files.length) {
    log('Please select a backup JSON file first', false);
    btn.disabled = false;
    btn.textContent = 'Start Migration';
    return;
  }
  try {
    var text = await fileInput.files[0].text();
    backupData = JSON.parse(text);
    log('Backup file loaded: ' + Object.keys(backupData).length + ' keys', true);
  } catch(e) {
    log('Failed to load backup file: ' + e.message, false);
    btn.disabled = false;
    btn.textContent = 'Start Migration';
    return;
  }

  var users = backupData.users || [];
  if (!users.length) { log('No users found in backup', false); btn.disabled = false; btn.textContent = 'Start Migration'; return; }

  log('Found ' + users.length + ' users to migrate', true);

  var auth = firebase.auth();
  var db = firebase.firestore();

  var succeeded = 0, failed = 0;

  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var email = u.email || (u.username + '@app.local');

    log('[' + (i+1) + '/' + users.length + '] ' + u.username + ' (' + email + ')...', false);

    try {
      // 1. Create Firebase Auth account
      var result = await auth.createUserWithEmailAndPassword(email, pass);
      var uid = result.user.uid;
      log('  ✓ Firebase Auth account created', true);

      // 2. Write profile to Firestore
      await db.collection('profiles').doc(uid).set({
        username: u.username,
        name: u.name || u.username,
        email: email,
        role: u.role || 'executive_task',
        is_admin: u.isAdmin || false,
        executive_admin: u.executiveAdmin || false
      });
      log('  ✓ Profile saved to Firestore', true);

      // 3. Build userData from backup
      var userData = {
        profile: {
          username: u.username,
          name: u.name || u.username,
          email: email,
          isAdmin: u.isAdmin || false,
          role: u.role || 'executive_task'
        }
      };

      // Copy tasks, plans, milestones, dailylog, trips
      ['tasks','plans','milestones','dailylog','trips','shared_tasks','expenses'].forEach(function(k) {
        var key = k + '_' + u.username;
        if (backupData[key] && Array.isArray(backupData[key])) {
          userData[k] = backupData[key];
        }
      });

      // Copy IT data
      ['assets','services','maintenance','inventory','task','planner','accomplishments','tickets','systems','timetrack','knowledge','auditlog'].forEach(function(t) {
        var key = 'it_' + t + '_' + u.username;
        if (backupData[key] && Array.isArray(backupData[key])) {
          userData['it_' + t] = backupData[key];
        }
      });

      // Copy notes (string)
      var notesKey = 'notes_' + u.username;
      if (backupData[notesKey]) {
        userData._notes = backupData[notesKey];
      }

      // 4. Write userData to Firestore
      await db.collection('userdata').doc(uid).set({
        data: userData,
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
      });
      log('  ✓ Data saved to Firestore (' + Object.keys(userData).length + ' keys)', true);

      // 5. Sign out to allow next user creation
      await auth.signOut();
      succeeded++;
    } catch(e) {
      if (e.code === 'auth/email-already-in-use') {
        log('  ⚠ Email already in use, updating data...', false);
        try {
          // Sign in to get uid, then write data
          var result = await auth.signInWithEmailAndPassword(email, pass);
          var uid = result.user.uid;
          await db.collection('profiles').doc(uid).set({
            username: u.username,
            name: u.name || u.username,
            email: email,
            role: u.role || 'executive_task',
            is_admin: u.isAdmin || false,
            executive_admin: u.executiveAdmin || false
          });
          log('  ✓ Profile updated', true);

          var userData = { profile: { username: u.username, name: u.name || u.username, email: email, isAdmin: u.isAdmin || false, role: u.role || 'executive_task' } };
          ['tasks','plans','milestones','dailylog','trips','shared_tasks','expenses'].forEach(function(k) {
            var key = k + '_' + u.username;
            if (backupData[key] && Array.isArray(backupData[key])) userData[k] = backupData[key];
          });
          ['assets','services','maintenance','inventory','task','planner','accomplishments','tickets','systems','timetrack','knowledge','auditlog'].forEach(function(t) {
            var key = 'it_' + t + '_' + u.username;
            if (backupData[key] && Array.isArray(backupData[key])) userData['it_' + t] = backupData[key];
          });
          var notesKey = 'notes_' + u.username;
          if (backupData[notesKey]) userData._notes = backupData[notesKey];

          await db.collection('userdata').doc(uid).set({ data: userData, updated_at: firebase.firestore.FieldValue.serverTimestamp() });
          log('  ✓ Data saved to Firestore (' + Object.keys(userData).length + ' keys)', true);
          await auth.signOut();
          succeeded++;
        } catch(e3) {
          log('  ✗ ' + (e3.message || e3), false);
          failed++;
        }
      } else {
        log('  ✗ ' + (e.message || e), false);
        failed++;
      }
    }
  }

  log('', false);
  log('========================================', true);
  log('Migration complete: ' + succeeded + ' succeeded, ' + failed + ' failed', true);
  log('Default password for all users: ' + pass, true);
  log('========================================', true);

  btn.textContent = 'Done ✓';
}
</script>
</body>
</html>
