<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Migrate Backup Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    var SUPABASE_URL = 'https://xhweqrlyppvtksqbqrne.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_UMaXwhml3R_i0HFxYDuzXg_LtFmx96A';
    var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
    });
  </script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
  <div class="max-w-2xl mx-auto space-y-6">
    <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-1">Migrate Backup Data</h1>
      <p class="text-sm text-gray-500 mb-6">Ilipat ang Executive IT data mula sa backup JSON papunta sa Supabase user account.</p>

      <!-- Step 1: Login -->
      <div id="stepLogin" class="border border-gray-200 rounded-xl p-4 mb-4">
        <h2 class="font-bold text-gray-700 mb-3">Step 1: Login sa Supabase</h2>
        <div class="space-y-3">
          <input id="loginEmail" type="email" value="joseph.diala30@gmail.com" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm" placeholder="Email"/>
          <input id="loginPass" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm" placeholder="Password"/>
          <button id="loginBtn" onclick="doLogin()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition text-sm">Login</button>
          <p id="loginMsg" class="text-xs text-gray-500 mt-1"></p>
        </div>
      </div>

      <!-- Step 2: Upload Backup -->
      <div id="stepUpload" class="border border-gray-200 rounded-xl p-4 mb-4 hidden">
        <h2 class="font-bold text-gray-700 mb-3">Step 2: I-load ang Backup File</h2>
        <p class="text-xs text-gray-500 mb-3">Auto-load ang scheduler-backup-2026-06-04.json. Kung hindi, i-click ang Choose File.</p>
        <input id="fileInput" type="file" accept=".json" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
        <p id="fileStatus" class="text-xs text-gray-500 mt-2"></p>
      </div>

      <!-- Step 3: Preview & Migrate -->
      <div id="stepMigrate" class="border border-gray-200 rounded-xl p-4 hidden">
        <h2 class="font-bold text-gray-700 mb-3">Step 3: Preview Data</h2>
        <div id="previewData" class="text-sm text-gray-600 mb-4"></div>
        <button id="migrateBtn" onclick="doMigrate()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700 transition text-sm">Start Migration</button>
        <p id="migrateMsg" class="text-xs text-gray-500 mt-2"></p>
      </div>

      <!-- Log -->
      <div id="log" class="mt-4 text-sm font-mono bg-gray-900 text-green-400 rounded-xl p-4 h-48 overflow-y-auto hidden"></div>
    </div>
  </div>

  <script>
    var backupData = null;
    var userId = null;
    var itKeys = [];

    function log(msg) {
      var el = document.getElementById('log');
      el.classList.remove('hidden');
      el.innerHTML += '> ' + msg + '<br>';
      el.scrollTop = el.scrollHeight;
    }

    // Auto-load the backup file from the same directory
    fetch('./scheduler-backup-2026-06-04.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        backupData = data;
        document.getElementById('fileStatus').textContent = 'Loaded: scheduler-backup-2026-06-04.json (' + Object.keys(data).length + ' keys)';
        document.getElementById('fileStatus').className = 'text-xs text-emerald-600 mt-2 font-semibold';
      })
      .catch(function(err) {
        document.getElementById('fileStatus').textContent = 'Auto-load failed. Please choose file manually.';
        document.getElementById('fileStatus').className = 'text-xs text-amber-600 mt-2';
      });

    // Manual file upload fallback
    document.getElementById('fileInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          backupData = JSON.parse(ev.target.result);
          document.getElementById('fileStatus').textContent = 'Loaded: ' + file.name + ' (' + Object.keys(backupData).length + ' keys)';
          document.getElementById('fileStatus').className = 'text-xs text-emerald-600 mt-2 font-semibold';
        } catch(err) {
          alert('Invalid JSON: ' + err.message);
        }
      };
      reader.readAsText(file);
    });

    function doLogin() {
      var email = document.getElementById('loginEmail').value.trim();
      var pass = document.getElementById('loginPass').value;
      var btn = document.getElementById('loginBtn');
      var msg = document.getElementById('loginMsg');

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      msg.textContent = '';

      client.auth.signInWithPassword({ email: email, password: pass })
        .then(function(result) {
          if (result.error) {
            msg.textContent = 'Error: ' + result.error.message;
            msg.className = 'text-xs text-red-600 mt-1';
            btn.disabled = false;
            btn.textContent = 'Login';
            return;
          }
          userId = result.data.user.id;
          msg.textContent = 'Logged in as ' + email + ' (UID: ' + userId + ')';
          msg.className = 'text-xs text-emerald-600 mt-1 font-semibold';
          btn.textContent = 'Logged In';
          document.getElementById('stepUpload').classList.remove('hidden');
          document.getElementById('stepUpload').querySelector('h2').textContent = 'Step 2: I-load ang Backup File (auto-loaded)';
          checkPreview();
        })
        .catch(function(err) {
          msg.textContent = 'Error: ' + err.message;
          msg.className = 'text-xs text-red-600 mt-1';
          btn.disabled = false;
          btn.textContent = 'Login';
        });
    }

    function checkPreview() {
      if (!backupData || !userId) return;

      // Find IT data for joseph_diala in the backup
      var sourceUser = 'joseph_diala';
      itKeys = Object.keys(backupData).filter(function(k) {
        return k.indexOf('it_') === 0 && k.indexOf('_' + sourceUser) > 0;
      });

      if (itKeys.length === 0) {
        document.getElementById('previewData').innerHTML = '<p class="text-red-600">No IT data found for joseph_diala in backup.</p>';
        return;
      }

      var html = '<p class="font-semibold mb-2">Data na makikita para kay <strong>joseph_diala</strong>:</p><ul class="space-y-1">';
      var totalItems = 0;
      itKeys.forEach(function(k) {
        var items = Array.isArray(backupData[k]) ? backupData[k].length : 0;
        totalItems += items;
        var fbKey = k.replace('_' + sourceUser, '');
        html += '<li class="flex justify-between text-xs"><span>' + fbKey + '</span><span class="font-semibold">' + items + ' items</span></li>';
      });
      html += '<li class="flex justify-between text-xs font-bold border-t border-gray-200 pt-1 mt-1"><span>TOTAL</span><span>' + totalItems + ' items</span></li>';
      html += '</ul>';

      document.getElementById('previewData').innerHTML = html;
      document.getElementById('stepMigrate').classList.remove('hidden');
    }

    function doMigrate() {
      var btn = document.getElementById('migrateBtn');
      var msg = document.getElementById('migrateMsg');
      btn.disabled = true;
      btn.textContent = 'Migrating...';
      msg.textContent = '';
      log('Starting migration to user ' + userId + '...');

      // Build the data object
      var userData = {};
      var sourceUser = 'joseph_diala';
      var count = 0;

      itKeys.forEach(function(k) {
        var items = backupData[k];
        if (Array.isArray(items) && items.length > 0) {
          var fbKey = k.replace('_' + sourceUser, '');
          userData[fbKey] = items;
          count += items.length;
          log('  ' + fbKey + ': ' + items.length + ' items');
        }
      });

      // First, get existing userdata
      client.from('userdata').select('data').eq('id', userId).single()
        .then(function(result) {
          var existingData = {};
          if (!result.error && result.data && result.data.data) {
            existingData = result.data.data;
            log('Existing userdata found, merging...');
          } else {
            log('No existing userdata, creating new...');
          }

          // Merge: keep existing data, overwrite IT keys
          Object.keys(userData).forEach(function(k) {
            existingData[k] = userData[k];
          });

          // Upsert to Supabase
          return client.from('userdata').upsert(
            { id: userId, data: existingData, updated_at: new Date().toISOString() },
            { onConflict: 'id' }
          );
        })
        .then(function(result) {
          if (result.error) {
            log('ERROR: ' + result.error.message);
            msg.textContent = 'Migration failed: ' + result.error.message;
            msg.className = 'text-xs text-red-600 mt-2';
            btn.textContent = 'Retry';
            btn.disabled = false;
            return;
          }
          log('Migration complete! ' + count + ' items transferred.');
          msg.textContent = 'Success! ' + count + ' items migrated.';
          msg.className = 'text-xs text-emerald-600 mt-2 font-semibold';
          btn.textContent = 'Done';
          btn.className = 'bg-gray-400 text-white px-6 py-2 rounded-lg font-bold text-sm cursor-not-allowed';

          // Also update localStorage
          var session = JSON.parse(localStorage.getItem('session') || 'null');
          if (session && session.username) {
            var username = session.username;
            Object.keys(userData).forEach(function(k) {
              localStorage.setItem(k + '_' + username, JSON.stringify(userData[k]));
            });
            log('LocalStorage updated for ' + username);
          }
        })
        .catch(function(err) {
          log('ERROR: ' + err.message);
          msg.textContent = 'Error: ' + err.message;
          msg.className = 'text-xs text-red-600 mt-2';
          btn.textContent = 'Retry';
          btn.disabled = false;
        });
    }
  </script>
</body>
</html>
