<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Data Migration Tool</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    var path = window.location.pathname;
    var src = (path.indexOf('/migrate-joseph/') !== -1) ? '../firebase-config.js' : 'firebase-config.js';
    document.write('<script src="' + src + '"><\/script>');
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-gray-800 rounded-2xl p-6 shadow-2xl space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-white">IT Data Migration</h1>
      <p class="text-gray-400 text-sm mt-1">Migrate "joseph_diala" backup data to your active account</p>
    </div>

    <!-- Login Area -->
    <div id="authArea" class="space-y-4">
      <h2 class="text-lg font-semibold text-white">1. Log in to your target account</h2>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Email Address</label>
        <input id="email" type="email" placeholder="joseph.diala30@gmail.com" value="joseph.diala30@gmail.com" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input id="password" type="password" placeholder="••••••••" class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-blue-500"/>
      </div>
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition">Log In</button>
    </div>

    <!-- Migration Area -->
    <div id="migrationArea" class="hidden space-y-4">
      <div class="bg-gray-700/50 p-4 rounded-xl border border-gray-700">
        <p class="text-sm text-gray-300">Logged in as: <strong id="currentUserEmail" class="text-blue-400"></strong></p>
        <button onclick="logout()" class="text-xs text-red-400 hover:underline mt-1">Logout</button>
      </div>

      <h2 class="text-lg font-semibold text-white">2. Select Backup File</h2>
      <div>
        <input id="fileInput" type="file" accept=".json" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-gray-200 hover:file:bg-gray-600"/>
        <p class="text-[11px] text-gray-500 mt-1">Select the <strong>scheduler-backup-2026-06-04.json</strong> file.</p>
      </div>

      <button id="migrateBtn" onclick="startMigration()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">Start Migration</button>
    </div>

    <!-- Log Console -->
    <div id="logConsole" class="hidden mt-4 text-xs font-mono bg-black text-green-400 rounded-xl p-4 h-48 overflow-y-auto border border-gray-700"></div>
  </div>

  <script>
    var backupData = null;
    var currentUser = null;

    // Listen for auth state
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        currentUser = user;
        document.getElementById('authArea').classList.add('hidden');
        document.getElementById('migrationArea').classList.remove('hidden');
        document.getElementById('currentUserEmail').textContent = user.email;
        log("Ready to migrate to account " + user.email);
        
        // Try auto-loading file if placed in root
        autoLoadFile();
      } else {
        currentUser = null;
        document.getElementById('authArea').classList.remove('hidden');
        document.getElementById('migrationArea').classList.add('hidden');
      }
    });

    function log(msg) {
      var consoleEl = document.getElementById('logConsole');
      consoleEl.classList.remove('hidden');
      consoleEl.innerHTML += '> ' + msg + '<br>';
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function login() {
      var email = document.getElementById('email').value.trim();
      var pw = document.getElementById('password').value;
      if (!email || !pw) {
        alert("Please enter both email and password");
        return;
      }
      try {
        await firebase.auth().signInWithEmailAndPassword(email, pw);
      } catch(err) {
        alert("Login failed: " + err.message);
      }
    }

    async function logout() {
      await firebase.auth().signOut();
      document.getElementById('logConsole').classList.add('hidden');
      document.getElementById('logConsole').innerHTML = '';
    }

    async function autoLoadFile() {
      try {
        var response = await fetch('scheduler-backup-2026-06-04.json');
        if (response.ok) {
          backupData = await response.json();
          log("Automatically loaded scheduler-backup-2026-06-04.json!");
        }
      } catch(e) {
        log("Could not auto-load backup file due to local file protocol CORS. Please select it manually below.");
      }
    }

    // Handle file input
    document.getElementById('fileInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(evt) {
        try {
          backupData = JSON.parse(evt.target.result);
          log("Successfully loaded selected file: " + file.name);
        } catch(err) {
          alert("Invalid JSON: " + err.message);
        }
      };
      reader.readAsText(file);
    });

    async function startMigration() {
      if (!backupData) {
        alert("Please select or load the backup JSON file first.");
        return;
      }
      if (!currentUser) {
        alert("You must be logged in.");
        return;
      }

      var btn = document.getElementById('migrateBtn');
      btn.disabled = true;
      btn.textContent = "Migrating...";
      btn.className = "w-full bg-gray-600 text-gray-400 font-bold py-3 rounded-xl cursor-not-allowed";

      log("Extracting 'joseph_diala' IT data from backup...");

      // Keys to extract
      var keysToMigrate = [
        'tasks', 'plans', 'milestones', 'dailylog', 'trips',
        'it_assets', 'it_services', 'it_maintenance', 'it_inventory',
        'it_task', 'it_planner', 'it_accomplishments', 'it_tickets', 'it_systems'
      ];

      var updatePayload = {};
      var count = 0;

      keysToMigrate.forEach(function(baseKey) {
        // Find corresponding backup key, e.g. tasks_joseph_diala
        var backupKey = baseKey + '_joseph_diala';
        if (backupData[backupKey]) {
          updatePayload[baseKey] = backupData[backupKey];
          log("  Found data for " + baseKey + " (" + backupData[backupKey].length + " items)");
          count++;
        }
      });

      if (count === 0) {
        log("ERROR: No 'joseph_diala' keys found in the backup file.");
        btn.disabled = false;
        btn.textContent = "Start Migration";
        btn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition";
        return;
      }

      log("Uploading to Firestore...");
      try {
        await firebase.firestore().collection('userdata').doc(currentUser.uid).set(updatePayload, { merge: true });
        log("SUCCESS: Migrated " + count + " datasets to Firestore!");
        log("You can now refresh the app and log in as " + currentUser.email + " to view your synced IT dashboard.");
        alert("Migration Successful!");
      } catch(err) {
        log("ERROR writing to Firestore: " + err.message);
        alert("Migration failed: " + err.message);
      }

      btn.disabled = false;
      btn.textContent = "Migration Complete";
      btn.className = "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition";
    }
  </script>
</body>
</html>
