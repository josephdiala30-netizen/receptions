<!DOCTYPE html>
<html class="h-full">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KALYX Mobile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config={theme:{extend:{colors:{brand:'#6366f1','brand-dark':'#4f46e5'}}}}
</script>
<link rel="stylesheet" href="styles/mobile.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#6366f1">
</head>
<body class="h-full bg-slate-50">
<header class="sticky top-0 z-30 bg-white/80 backdrop-blur-lg border-b border-slate-200 px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center">
      <span class="material-symbols-outlined text-white text-lg">workspace_premium</span>
    </div>
    <h1 class="text-lg font-extrabold text-slate-900">KALYX</h1>
  </div>
  <button id="install-btn" onclick="installApp()" style="display:none" class="p-2 text-slate-500 hover:text-slate-700 rounded-lg hover:bg-slate-100" title="Install App">
    <span class="material-symbols-outlined">download</span>
  </button>
  <button onclick="mobileApp.toggleTheme()" class="p-2 text-slate-500 hover:text-slate-700 rounded-lg hover:bg-slate-100">
    <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
  </button>
</header>

<main class="flex-1 px-4 pt-6 pb-4">
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-900">Portals</h2>
    <p class="text-sm text-slate-500 mt-1">Select a portal to continue</p>
  </div>
  <div class="grid gap-4" id="portal-list"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../firebase-data.js"></script>
<script src="js/mobile.js"></script>
<script>
var portals = [
  { id: 'executive_it', name: 'Executive IT', icon: 'dns', desc: 'IT Management Portal', color: 'from-indigo-500 to-purple-600', bg: 'bg-indigo-50' },
  { id: 'executive_task', name: 'Executive Task', icon: 'checklist', desc: 'Task Management Portal', color: 'from-emerald-500 to-teal-600', bg: 'bg-emerald-50' },
  { id: 'executive_path', name: 'Executive Path', icon: 'map', desc: 'Travel Management Portal', color: 'from-orange-500 to-rose-600', bg: 'bg-orange-50' },
  { id: 'admin', name: 'Administrator', icon: 'admin_panel_settings', desc: 'Admin Control Panel', color: 'from-sky-500 to-blue-600', bg: 'bg-sky-50' }
];

function renderPortals() {
  var list = document.getElementById('portal-list');
  var session = fbGetSession();
  var role = session ? session.role : null;
  var isAdmin = session ? session.isAdmin : false;
  var allowed = isAdmin ? portals : portals.filter(function(p) {
    if (role === 'admin') return p.id === 'admin';
    return p.id === role || p.id === 'admin';
  });
  if (!session || !session.loggedIn) {
    allowed = portals;
  }
  list.innerHTML = allowed.map(function(p) {
    var page = p.id.replace(/_/g, '-');
    return '<div onclick="window.location.href=\'' + page + '.html\'" class="bg-white rounded-xl p-4 border border-slate-100 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">' +
      '<div class="w-12 h-12 ' + p.bg + ' rounded-xl flex items-center justify-center flex-shrink-0">' +
        '<span class="material-symbols-outlined text-2xl" style="color:' + (p.id === 'executive_it' ? '#6366f1' : p.id === 'executive_task' ? '#059669' : p.id === 'executive_path' ? '#ea580c' : '#0284c7') + '">' + p.icon + '</span>' +
      '</div>' +
      '<div class="flex-1 min-w-0">' +
        '<h3 class="font-bold text-slate-900">' + p.name + '</h3>' +
        '<p class="text-xs text-slate-500">' + p.desc + '</p>' +
      '</div>' +
      '<span class="material-symbols-outlined text-slate-300">chevron_right</span>' +
    '</div>';
  }).join('');
}

mobileApp.onReady = function() {
  var session = fbGetSession();
  if (session && session.loggedIn) {
    var role = session.role;
    var isAdmin = session.isAdmin;
    if (isAdmin) { window.location.href = 'admin.html'; return; }
    var map = { 'executive_it': 'executive-it.html', 'executive_task': 'executive-task.html', 'executive_path': 'executive-path.html' };
    if (map[role]) { window.location.href = map[role]; return; }
  }
  renderPortals();
};
mobileApp.init();
</script>
</body>
</html>
